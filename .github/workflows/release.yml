name: Attach Windows installer to release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install NSIS
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis

      - name: Build installer
        env:
          ADDIN_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: bash tools/build-windows-installer.sh

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: PowerPrezTools-Setup.exe

      - name: Upload as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: PowerPrezTools-Setup
          path: PowerPrezTools-Setup.exe
